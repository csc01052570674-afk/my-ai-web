<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우영이앤텍 AI 비서</title>
    <style>
        body { font-family: 'Apple SD Gothic Neo', sans-serif; background-color: #f4f7f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 100%; max-width: 450px; height: 600px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        #header { background: #0056b3; color: white; padding: 20px; text-align: center; font-size: 1.2rem; font-weight: bold; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px 16px; border-radius: 15px; max-width: 85%; line-height: 1.5; font-size: 0.95rem; }
        .user { background: #0056b3; align-self: flex-end; color: white; border-bottom-right-radius: 2px; }
        .ai { background: #e9e9eb; align-self: flex-start; color: #333; border-bottom-left-radius: 2px; }
        .error { color: #d93025; background: #feefee; align-self: center; font-size: 0.85rem; border: 1px solid #f9d2ce; }
        #input-area { display: flex; padding: 15px; border-top: 1px solid #eee; background: #fff; }
        input { flex: 1; border: 1px solid #ddd; border-radius: 25px; padding: 12px 20px; outline: none; font-size: 1rem; }
        button { background: #0056b3; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; margin-left: 10px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #004494; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="header">우영이앤텍 AI 비서</div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="무엇이든 물어보세요..." onkeypress="if(event.keyCode==13) sendMessage()">
        <button onclick="sendMessage()">▲</button>
    </div>
</div>

<script>
    // ⚠️ 주의: 구글 AI 스튜디오에서 받은 키를 아래 따옴표 사이에 꼭 넣어주세요!
    const API_KEY = "AIzaSyAq8oumDyDGgY1zi8RuUbUX53FNa2m2_4g"; 
    const MODEL_NAME = "gemini-1.5-flash";

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const messagesDiv = document.getElementById('messages');
        const text = input.value.trim();
        
        if (!text) return;

        addMessage(text, 'user');
        input.value = '';

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            });

            const data = await response.json();

            if (data.error) throw new Error(data.error.message);

            const aiResponse = data.candidates[0].content.parts[0].text;
            addMessage(aiResponse, 'ai');

        } catch (error) {
            console.error(error);
            addMessage("연결 실패: API 키를 다시 확인해주세요.", 'error');
        }
    }

    function addMessage(text, type) {
        const messagesDiv = document.getElementById('messages');
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${type}`;
        msgDiv.innerText = text;
        messagesDiv.appendChild(msgDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
</script>

</body>
</html>
